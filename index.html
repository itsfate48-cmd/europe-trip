<meta charset="UTF-8">

<style>
  :root {
    --bg:#07070e; --bg2:#0d0d1e; --bg3:#111128; --card:#101022;
    --border:rgba(255,255,255,0.07);
    --gold:#f8a820; --gold2:#ff7043; --green:#22d47a; --red:#ff6b6b; --blue:#818cf8; --amber:#f59e0b;
    --text:#e2e2f0; --text2:#9090b0; --text3:#4a4a6a;
    --fh:'Syne',sans-serif; --fb:'DM Sans',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;}

  .hdr{background:linear-gradient(160deg,var(--bg2),var(--bg3));border-bottom:1px solid rgba(248,168,32,0.12);padding:22px 18px 0;}
  .trip-title{font-family:var(--fh);font-size:22px;font-weight:800;color:var(--gold);letter-spacing:-.5px;}
  .trip-sub{font-size:12px;color:var(--text3);margin:3px 0 14px;}
  .sum-row{display:flex;gap:9px;margin-bottom:13px;}
  .sum-card{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;padding:9px 12px;}
  .sum-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:2px;}
  .sum-val{font-family:var(--fh);font-size:17px;font-weight:700;}
  .c-w{color:var(--text);} .c-g{color:var(--green);} .c-r{color:var(--red);}
  .prog-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:5px;}
  .prog-bar{height:5px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;margin-bottom:15px;}
  .prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:3px;}

  .tabs-wrap{background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
  .tabs-wrap::-webkit-scrollbar{display:none;}
  .tabs-row{display:flex;padding:0 10px;white-space:nowrap;}
  .tab{padding:11px 13px;font-size:12.5px;color:var(--text3);cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;font-family:var(--fb);display:inline-flex;align-items:center;gap:5px;transition:all .2s;}
  .tab:hover{color:var(--text2);}
  .tab.active{color:var(--gold);border-bottom-color:var(--gold);font-weight:500;}

  .content{padding:16px 16px 40px;max-width:720px;margin:0 auto;}

  .alert-box{border-radius:11px;padding:13px 15px;margin-bottom:12px;}
  .alert-box.red{background:rgba(255,107,107,0.07);border:1px solid rgba(255,107,107,0.2);}
  .alert-box.amber{background:rgba(245,158,11,0.07);border:1px solid rgba(245,158,11,0.2);}
  .alert-title{font-size:12px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
  .alert-box.red .alert-title{color:var(--red);}
  .alert-box.amber .alert-title{color:var(--amber);}
  .alert-item{font-size:12px;color:#c0c0d8;margin-top:5px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:color .15s;}
  .alert-item:hover{color:var(--text);}
  .alert-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
  .alert-box.red .alert-dot{background:var(--red);}
  .alert-box.amber .alert-dot{background:var(--amber);}

  .ov-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;margin-top:18px;}
  .ov-row{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:7px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .2s;}
  .ov-row:hover{background:#16162e;}
  .ov-flag{font-size:20px;flex-shrink:0;}
  .ov-info{flex:1;}
  .ov-city{font-size:13.5px;font-weight:500;color:#d0d0e8;}
  .ov-dates{font-size:11.5px;color:var(--text3);margin-top:1px;}
  .ov-right{text-align:right;}
  .ov-total{font-family:var(--fh);font-size:14px;font-weight:700;color:var(--text);}
  .ov-paid{font-size:11px;color:var(--green);margin-top:2px;}
  .mini-bar{width:56px;height:3px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden;margin-top:4px;margin-left:auto;}
  .mini-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:2px;}

  .dest-hdr{background:linear-gradient(135deg,var(--bg3),#16163a);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px;}
  .dest-top{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .dest-flag{font-size:28px;}
  .dest-city{font-family:var(--fh);font-size:22px;font-weight:800;letter-spacing:-.5px;}
  .dest-info{font-size:12px;color:var(--text3);margin-top:2px;}
  .dest-nums{display:flex;gap:9px;}
  .dn{flex:1;background:rgba(255,255,255,0.04);border-radius:8px;padding:9px 11px;}
  .dn-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:2px;}
  .dn-val{font-family:var(--fh);font-size:16px;font-weight:700;}

  .sec{margin-bottom:16px;}
  .sec-title{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;padding-left:2px;}
  .item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:6px;display:flex;align-items:center;gap:11px;}
  .item-icon{width:33px;height:33px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
  .ic-stay{background:rgba(99,102,241,0.14);} .ic-flight{background:rgba(14,165,233,0.14);}
  .ic-transport{background:rgba(168,85,247,0.14);} .ic-food{background:rgba(239,68,68,0.14);}
  .ic-fun{background:rgba(248,168,32,0.14);} .ic-event{background:rgba(34,212,122,0.14);}
  .ic-activity{background:rgba(34,212,122,0.14);} .ic-gear{background:rgba(107,114,128,0.14);}
  .ic-shopping{background:rgba(236,72,153,0.14);}
  .item-body{flex:1;}
  .item-name{font-size:13.5px;font-weight:500;color:#d0d0e8;}
  .item-detail{font-size:11.5px;color:var(--text3);margin-top:2px;}
  .item-split{font-size:11.5px;color:var(--blue);margin-top:2px;}
  .item-owing{font-size:11.5px;color:var(--gold);margin-top:2px;}
  .item-right{text-align:right;flex-shrink:0;}
  .item-cost{font-family:var(--fh);font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px;}
  .badge{font-size:9.5px;font-weight:600;letter-spacing:.4px;padding:2px 7px;border-radius:20px;text-transform:uppercase;}
  .b-booked{background:rgba(34,212,122,0.13);color:var(--green);}
  .b-pay_venue{background:rgba(248,168,32,0.13);color:var(--gold);}
  .b-half{background:rgba(248,168,32,0.13);color:var(--gold);}
  .b-todo{background:rgba(255,107,107,0.13);color:var(--red);}
  .b-spend{background:rgba(129,140,248,0.12);color:var(--blue);}
  .b-event{background:rgba(34,212,122,0.13);color:var(--green);}
</style>
</head>

const fmt=n=>n===0||n==null?"—":"$"+Number(n).toLocaleString('en-AU',{minimumFractionDigits:0,maximumFractionDigits:2});
const dTotal=d=>d.items.reduce((s,i)=>s+(i.cost||0),0);
const dPaid=d=>d.items.reduce((s,i)=>s+(i.paidAmt||0),0);

function initHeader(){
  const real=DESTS.filter(d=>!d.isOverview);
  const total=real.reduce((s,d)=>s+dTotal(d),0);
  const paid=real.reduce((s,d)=>s+dPaid(d),0);
  const owed=total-paid;
  const pct=Math.round((paid/total)*100);
  document.getElementById("grand-total").textContent=fmt(total);
  document.getElementById("grand-paid").textContent=fmt(paid);
  document.getElementById("grand-owed").textContent=fmt(owed);
  document.getElementById("grand-pct").textContent=pct+"% paid";
  document.getElementById("grand-bar").style.width=pct+"%";
}

function renderOverview(){
  const real=DESTS.filter(d=>!d.isOverview);
  const todos=[];
  real.forEach(d=>d.items.filter(i=>i.status==="todo").forEach(it=>todos.push({d,it})));

  let html="";

  // red box
  if(todos.length){
    html+=`<div class="alert-box red"><div class="alert-title">🔴 Needs Booking</div>`;
    todos.forEach(({d,it})=>{
      html+=`<div class="alert-item" onclick="switchTab('${d.id}')"><span class="alert-dot"></span>${d.emoji} ${d.city} — ${it.name}</div>`;

    html+=`</div>`;
  }

  // amber box
  html+=`<div class="alert-box amber"><div class="alert-title">🟡 Needs Planning</div>`;
  NEEDS_PLAN.forEach(p=>{
    html+=`<div class="alert-item" onclick="switchTab('${p.destId}')"><span class="alert-dot"></span>${p.dest} — ${p.text}</div>`;
  });
  html+=`</div>`;

  // destinations list
  html+=`<div class="ov-title">All Destinations</div>`;
  real.forEach(d=>{
    const total=dTotal(d), paid=dPaid(d);
    const pct=total>0?Math.min(100,Math.round((paid/total)*100)):0;
    html+=`<div class="ov-row" onclick="switchTab('${d.id}')">
      <span class="ov-flag">${d.emoji}</span>
      <div class="ov-info"><div class="ov-city">${d.city}</div><div class="ov-dates">${d.country} · ${d.dates}</div></div>
      <div class="ov-right">
        <div class="ov-total">${fmt(total)}</div>
        <div class="ov-paid">${fmt(paid)} paid</div>
        <div class="mini-bar"><div class="mini-fill" style="width:${pct}%"></div></div>
      </div>
    </div>`;
  });
  return html;
}

function renderDest(d){
  const total=dTotal(d), paid=dPaid(d), rem=total-paid;
  const pct=total>0?Math.min(100,Math.round((paid/total)*100)):0;
  const bookings=d.items.filter(i=>["booked","pay_venue","half","todo"].includes(i.status));
  const events=d.items.filter(i=>i.status==="event");
  const spending=d.items.filter(i=>i.status==="spend");

  const itemsHtml=items=>items.map(it=>{
    const icon=ICONS[it.type]||"📌";
    const label=BADGE[it.status]||it.status;
    const cls=BCLS[it.status]||"";
    const splitLine=it.split?`<div class="item-split">÷ 2 people = ${fmt(it.split)} each</div>`:"";
    const owingLine=(it.paidAmt>0&&it.paidAmt<it.cost)?`<div class="item-owing">${fmt(it.paidAmt)} paid · ${fmt(it.cost-it.paidAmt)} owing</div>`:"";
    const costHtml=it.cost>0?`<div class="item-cost">${fmt(it.cost)}</div>`:"";
    return`<div class="item">
      <div class="item-icon ic-${it.type}">${icon}</div>
      <div class="item-body">
        <div class="item-name">${it.name}</div>
        ${it.detail?`<div class="item-detail">${it.detail}</div>`:""}
        ${splitLine}${owingLine}
      </div>
      <div class="item-right">${costHtml}<span class="badge ${cls}">${label}</span></div>
    </div>`;
  }).join("");

  return`<div class="dest-hdr">
    <div class="dest-top">
      <span class="dest-flag">${d.emoji}</span>
      <div><div class="dest-city">${d.city}</div><div class="dest-info">${d.country} · ${d.dates}</div></div>
    </div>
    <div class="dest-nums">
      <div class="dn"><div class="dn-label">Total</div><div class="dn-val c-w">${fmt(total)}</div></div>
      <div class="dn"><div class="dn-label">Paid</div><div class="dn-val c-g">${fmt(paid)}</div></div>
      <div class="dn"><div class="dn-label">Owed</div><div class="dn-val c-r">${fmt(rem)}</div></div>
    </div>
    <div style="margin-top:13px">
      <div class="prog-meta"><span>Paid</span><span>${pct}%</span></div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div>
  </div>
  ${bookings.length?`<div class="sec"><div class="sec-title">Bookings & Transport</div>${itemsHtml(bookings)}</div>`:""}
  ${events.length?`<div class="sec"><div class="sec-title">Events</div>${itemsHtml(events)}</div>`:""}
  ${spending.length?`<div class="sec"><div class="sec-title">Spending Budget</div>${itemsHtml(spending)}</div>`:""}`;
}

let activeTab="overview";
function switchTab(id){
  activeTab=id;
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.id===id));
  const dest=DESTS.find(d=>d.id===id);
  document.getElementById("content").innerHTML=dest.isOverview?renderOverview():renderDest(dest);
  const el=document.querySelector(".tab.active");
  if(el) el.scrollIntoView({block:"nearest",inline:"center",behavior:"smooth"});
}

function init(){
  initHeader();
  const tabsEl=document.getElementById("tabs");
  DESTS.forEach(d=>{
    const btn=document.createElement("button");
    btn.className="tab"+(d.id===activeTab?" active":"");
    btn.dataset.id=d.id;
    btn.innerHTML=`<span>${d.emoji}</span>${d.city||d.label}`;
    btn.onclick=()=>switchTab(d.id);
    tabsEl.appendChild(btn);
  });
  switchTab(activeTab);
}
init();
</script>
</body>
</html>
